<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>CareerFlow — Interview Prep & Productivity</title>

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- SEO -->
    <meta
      name="description"
      content="CareerFlow helps students prepare for interviews, track applications, organize study plans, and accelerate career growth."
    />

    <meta
      name="keywords"
      content="CareerFlow, interview preparation, job tracker, career planner, productivity, resume builder, students"
    />

    <meta name="author" content="CareerFlow Team" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://career-flow-seven.vercel.app/" />

    <!-- Open Graph (WhatsApp, LinkedIn, Facebook, Discord) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CareerFlow" />
    <meta
      property="og:title"
      content="CareerFlow — Interview Prep & Productivity"
    />
    <meta
      property="og:description"
      content="Prepare for interviews, organize job applications, and boost your productivity with CareerFlow."
    />
    <meta property="og:url" content="https://career-flow-seven.vercel.app/" />
    <meta
      property="og:image"
      content="https://career-flow-seven.vercel.app/preview.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="CareerFlow preview image" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="CareerFlow — Interview Prep & Productivity"
    />
    <meta
      name="twitter:description"
      content="Prepare for interviews, organize job applications, and boost your productivity with CareerFlow."
    />
    <meta
      name="twitter:image"
      content="https://career-flow-seven.vercel.app/preview.png"
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0F172A" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-surface antialiased text-slate-900">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
